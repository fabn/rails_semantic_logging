name: Release

on:
  release:
    types: [published]

jobs:
  push:
    name: Push to RubyGems
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - uses: rubygems/release-gem@v1
