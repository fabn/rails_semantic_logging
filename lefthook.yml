min_version: 2.0.0

pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: "*.rb"
      stage_fixed: true
      run: bundle exec rubocop --format=emacs --parallel --force-exclusion -A {staged_files}

pre-push:
  commands:
    rubocop:
      run: bundle exec rubocop --format=emacs --parallel --force-exclusion {push_files}
